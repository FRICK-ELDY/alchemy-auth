services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: alchemy_auth
      POSTGRES_PASSWORD: alchemy_auth
      POSTGRES_DB: alchemy_auth_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alchemy_auth -d alchemy_auth_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
