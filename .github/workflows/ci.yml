name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alchemy_auth
          POSTGRES_PASSWORD: alchemy_auth
          POSTGRES_DB: alchemy_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alchemy_auth -d alchemy_auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      PGPORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix test
